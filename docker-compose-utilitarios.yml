# ============================================================
#  FirmaIessApi - Ecosistema de servicios utilitarios
#  Autor: Juan Carlos Estévez Hidalgo
#  Fecha: 07 may 2026
#
#  Servicios incluidos:
#    - PostgreSQL  → motor relacional principal (desarrollo local)
#    - Oracle 19c  → motor relacional institucional (EXTERNO)
#    - MongoDB     → auditoría
#    - Vault       → gestión de secretos
#    - vault-init  → carga automática de secretos (vault-init.sh)
#    - MinIO       → almacenamiento de objetos (PDF)
#
#  Uso:
#    Levantar todo:      docker-compose -f docker-compose-utilitarios.yml up -d
#    Detener todo:       docker-compose -f docker-compose-utilitarios.yml down
#    Ver logs:           docker-compose -f docker-compose-utilitarios.yml logs -f
#    Recargar secretos:  docker-compose -f docker-compose-utilitarios.yml up vault-init
# ============================================================

services:

  # ── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: base_spring_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: base_spring_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d base_spring_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MongoDB ──────────────────────────────────────────────────
  mongo:
    image: mongo:7-jammy
    container_name: base_spring_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo_user
      MONGO_INITDB_ROOT_PASSWORD: mongo_password
      MONGO_INITDB_DATABASE: AUDITORIA_IESS
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    command: mongod --quiet --logpath /dev/null
    networks:
      - net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── HashiCorp Vault ──────────────────────────────────────────
  vault:
    image: hashicorp/vault:1.15
    container_name: base_spring_vault
    restart: unless-stopped
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root-token
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_ADDR: "http://0.0.0.0:8200"
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    command: server -dev
    networks:
      - net
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Vault Init ───────────────────────────────────────────────
  # Ejecuta vault-init.sh al levantar el ecosistema.
  # Para modificar secretos editar vault-init.sh y reejecutar:
  #   docker-compose -f docker-compose-utilitarios.yml up vault-init
  vault-init:
    image: hashicorp/vault:1.15
    container_name: base_spring_vault_init
    restart: "no"
    environment:
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "root-token"
      IP_SERVER: ${IP_SERVER:-}
    depends_on:
      vault:
        condition: service_healthy
    networks:
      - net
    volumes:
      - ./vault-init.sh:/vault-init.sh
    entrypoint: ["sh", "/vault-init.sh"]

  # ── MinIO ────────────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: base_spring_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

# ── Red compartida ───────────────────────────────────────────
networks:
  net:
    name: net
    driver: bridge

# ── Volúmenes persistentes ───────────────────────────────────
volumes:
  postgres_data:
    name: base_spring_postgres_data
  mongo_data:
    name: base_spring_mongo_data
  minio_data:
    name: base_spring_minio_data
